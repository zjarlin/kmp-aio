name: Build and Release

on:
  workflow_dispatch:
  push:
    branches: [master, main, develop]
    tags: ['v*']
  pull_request:
    branches: [master, main]

env:
  JAVA_VERSION: '21'
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx6g -XX:MaxMetaspaceSize=2g" -Dorg.gradle.configureondemand=true

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
            gradlew: ./gradlew
            artifact_name: kcloud-macos-installer
            artifact_glob: apps/kcloud/ui/build/compose/binaries/**/*.dmg
          - os: windows-latest
            target: windows
            gradlew: ./gradlew.bat
            artifact_name: kcloud-windows-installer
            artifact_glob: apps/kcloud/ui/build/compose/binaries/**/*.msi

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare build-logic checkout
        shell: bash
        run: |
          rm -rf checkouts/build-logic
          mkdir -p checkouts
          git clone --depth 1 https://gitee.com/zjarlin/build-logic.git checkouts/build-logic
          python - <<'PY'
          from pathlib import Path

          catalog = Path("checkouts/build-logic/gradle/libs.versions.toml")
          text = catalog.read_text()
          if 'jna = "5.14.0"' not in text:
              text = text.replace('jimmer-ksp-version = "0.9.120"\n', 'jimmer-ksp-version = "0.9.120"\njna = "5.14.0"\n')
          alias = 'net-java-dev-jna-jna = { group = "net.java.dev.jna", name = "jna", version.ref = "jna" }\n'
          marker = 'javazoom-jlayer = { group = "javazoom", name = "jlayer", version.ref = "javazoom-jlayer" }\n'
          if alias not in text:
              text = text.replace(marker, marker + alias)
          catalog.write_text(text)
          PY

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Package KCloud Desktop (${{ matrix.target }})
        run: ${{ matrix.gradlew }} :apps:kcloud:ui:packageDistributionForCurrentOS --parallel

      - name: Upload Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          retention-days: 7
          if-no-files-found: error

  create-release:
    needs: [build-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List Artifacts
        run: find artifacts -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/kcloud-macos-installer/**/*.dmg
            artifacts/kcloud-windows-installer/**/*.msi
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
