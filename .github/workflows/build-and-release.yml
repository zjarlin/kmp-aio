name: Build and Release

on:
  push:
    branches: [master, main, develop]
    tags: ['v*']
  pull_request:
    branches: [master, main]

env:
  JAVA_VERSION: '21'
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx6g -XX:MaxMetaspaceSize=2g" -Dorg.gradle.configureondemand=true

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout addzero-lib-jvm
        uses: actions/checkout@v4
        with:
          repository: zjarlin/addzero-lib-jvm
          path: addzero-lib-jvm
          fetch-depth: 1

      - name: Fetch build-logic
        run: |
          mkdir -p addzero-lib-jvm/checkouts
          git clone --depth 1 https://gitee.com/zjarlin/build-logic.git addzero-lib-jvm/checkouts/build-logic

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Package KCloud Wasm Release
        run: ./gradlew :apps:kcloud:ui:wasmDistZip --parallel

      - name: Upload Wasm Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kcloud-wasm-dist
          path: apps/kcloud/ui/build/dist/release/dist.zip
          retention-days: 7
          if-no-files-found: error

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
            gradlew: ./gradlew
            artifact_name: kcloud-macos-installer
            artifact_glob: apps/kcloud/ui/build/compose/binaries/**/*.dmg
          - os: windows-latest
            target: windows
            gradlew: ./gradlew.bat
            artifact_name: kcloud-windows-installer
            artifact_glob: apps/kcloud/ui/build/compose/binaries/**/*.msi

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout addzero-lib-jvm
        uses: actions/checkout@v4
        with:
          repository: zjarlin/addzero-lib-jvm
          path: addzero-lib-jvm
          fetch-depth: 1

      - name: Fetch build-logic
        run: |
          mkdir -p addzero-lib-jvm/checkouts
          git clone --depth 1 https://gitee.com/zjarlin/build-logic.git addzero-lib-jvm/checkouts/build-logic

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Package KCloud Desktop (${{ matrix.target }})
        run: ${{ matrix.gradlew }} :apps:kcloud:ui:packageReleaseDistributionForCurrentOS --parallel

      - name: Upload Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          retention-days: 7
          if-no-files-found: error

  create-release:
    needs: [build-wasm, build-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List Artifacts
        run: find artifacts -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/kcloud-wasm-dist/dist.zip
            artifacts/kcloud-macos-installer/**/*.dmg
            artifacts/kcloud-windows-installer/**/*.msi
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
