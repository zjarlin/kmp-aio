name: Deploy Docs

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - README.md
      - apps/**/README.md
      - lib/**/README.md
      - xiaoeyu/**
      - xiaoeyu.config.json
      - .github/workflows/deploy-docs.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scaffold docs site
        run: node xiaoeyu/src/cli.mjs scaffold-site --target docs --force

      - name: Install docs dependencies
        run: npm install --prefix docs

      - name: Build docs site
        run: npm run build --prefix docs

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
