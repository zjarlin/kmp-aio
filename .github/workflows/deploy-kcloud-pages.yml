name: Deploy KCloud Pages

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - apps/kcloud/**
      - .github/workflows/deploy-kcloud-pages.yml
      - .github/workflows/build-and-release.yml
      - settings.gradle.kts
      - build.gradle.kts
      - gradle.properties
      - gradle/**
      - checkouts/build-logic/**

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: kcloud-pages
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx6g -XX:MaxMetaspaceSize=2g" -Dorg.gradle.configureondemand=true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout addzero-lib-jvm
        uses: actions/checkout@v4
        with:
          repository: zjarlin/addzero-lib-jvm
          path: addzero-lib-jvm
          fetch-depth: 1

      - name: Prepare shared build-logic checkouts
        shell: bash
        run: |
          rm -rf checkouts/build-logic addzero-lib-jvm/checkouts/build-logic
          mkdir -p checkouts addzero-lib-jvm/checkouts
          git clone --depth 1 https://gitee.com/zjarlin/build-logic.git checkouts/build-logic
          python - <<'PY'
          from pathlib import Path

          catalog = Path("checkouts/build-logic/gradle/libs.versions.toml")
          text = catalog.read_text()
          if 'jna = "5.14.0"' not in text:
              text = text.replace('jimmer-ksp-version = "0.9.120"\n', 'jimmer-ksp-version = "0.9.120"\njna = "5.14.0"\n')
          alias = 'net-java-dev-jna-jna = { group = "net.java.dev.jna", name = "jna", version.ref = "jna" }\n'
          marker = 'javazoom-jlayer = { group = "javazoom", name = "jlayer", version.ref = "javazoom-jlayer" }\n'
          if alias not in text:
              text = text.replace(marker, marker + alias)
          catalog.write_text(text)
          PY
          cp -R checkouts/build-logic addzero-lib-jvm/checkouts/build-logic

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build KCloud Wasm Pages Artifact
        run: ./gradlew :apps:kcloud:ui:prepareWasmReleaseFiles --parallel

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/kcloud/ui/build/dist/release/wasm

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
