name: Deploy KCloud Pages

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - apps/kcloud/**
      - .github/workflows/deploy-kcloud-pages.yml
      - .github/workflows/build-and-release.yml
      - settings.gradle.kts
      - build.gradle.kts
      - gradle.properties
      - gradle/**
      - checkouts/build-logic/**

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: kcloud-pages
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx6g -XX:MaxMetaspaceSize=2g" -Dorg.gradle.configureondemand=true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build KCloud Wasm Pages Artifact
        run: ./gradlew :apps:kcloud:ui:prepareWasmReleaseFiles --parallel

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/kcloud/ui/build/dist/release/wasm

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
