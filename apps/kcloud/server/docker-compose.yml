services:
  vibepocket-server:
    image: eclipse-temurin:21-jre-alpine
    container_name: vibepocket-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      # Ktor 环境配置
      - KTOR_ENV=${KTOR_ENV:-prod}
      - SERVER_PORT=8080
      - SERVER_HOST=0.0.0.0
      # 数据库配置（生产环境使用环境变量覆盖）
      - JDBC_DATABASE_URL=${JDBC_DATABASE_URL:-}
      - DATABASE_USERNAME=${DATABASE_USERNAME:-}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-}
      # S3 配置
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
    volumes:
      # 挂载配置文件（可选，如果不使用环境变量）
      - ./application-prod.conf:/app/application-prod.conf:ro
      # 数据持久化（如果使用 SQLite）
      - vibepocket-data:/app/data
      # 挂载 JAR 文件
      - ./build/libs:/app/libs:ro
    working_dir: /app
    command: >
      sh -c "java
      -Djava.security.egd=file:/dev/./urandom
      -Xms512m
      -Xmx2g
      -jar /app/libs/server.jar
      -config=/app/application-prod.conf
      || echo 'JAR not found, please run: ./gradlew :server:build'"
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - vibepocket-network

  # 可选：PostgreSQL 数据库（开发/测试环境）
  postgres:
    image: postgres:16-alpine
    container_name: vibepocket-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=vibepocket
      - POSTGRES_USER=${DB_USER:-vibepocket}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-vibepocket123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - vibepocket-network
    profiles:
      - with-db  # 使用 docker-compose --profile with-db up 启动

volumes:
  vibepocket-data:
  postgres-data:

networks:
  vibepocket-network:
    driver: bridge
