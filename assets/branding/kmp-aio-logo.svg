<svg width="1120" height="320" viewBox="0 0 1120 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">kmp-aio logo</title>
  <desc id="desc">Horizontal logo for the kmp-aio Kotlin Multiplatform monorepo.</desc>
  <defs>
    <linearGradient id="bg" x1="44" y1="32" x2="276" y2="284" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#134E4A"/>
    </linearGradient>
    <radialGradient id="glowWarm" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(134 126) rotate(54.1623) scale(128)">
      <stop stop-color="#FF6B4A" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#FF6B4A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCool" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(226 210) rotate(132.733) scale(152)">
      <stop stop-color="#38BDF8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="24" y="24" width="272" height="272" rx="72" fill="url(#bg)"/>
