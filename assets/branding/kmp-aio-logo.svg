  <text x="348" y="144" fill="#0F172A" font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="800" letter-spacing="-3">kmp<tspan fill="#FF6B4A">-aio</tspan></text>
  <text x="350" y="198" fill="#475569" font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="25" font-weight="700" letter-spacing="4">KOTLIN MULTIPLATFORM MONOREPO</text>
  <text x="350" y="244" fill="#64748B" font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="500">apps • libs • server • shared</text>
