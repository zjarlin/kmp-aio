  <circle cx="228" cy="214" r="108" fill="url(#glowCool)"/>

  <g opacity="0.14" stroke="#F8FAFC" stroke-width="8">
    <path d="M86 84H146"/>
    <path d="M86 236H146"/>
    <path d="M208 84H256"/>
    <path d="M224 236H262"/>
  </g>

  <g stroke="#F8FAFC" stroke-width="34" stroke-linecap="round" stroke-linejoin="round">
    <path d="M102 90V230"/>
    <path d="M132 160L216 94"/>
    <path d="M132 160L232 238"/>
  </g>

  <g>
    <circle cx="102" cy="90" r="20" fill="#FF6B4A"/>
    <circle cx="102" cy="230" r="20" fill="#2DD4BF"/>
    <circle cx="132" cy="160" r="22" fill="#FDBA74"/>
    <circle cx="216" cy="94" r="20" fill="#38BDF8"/>
    <circle cx="232" cy="238" r="20" fill="#A3E635"/>
